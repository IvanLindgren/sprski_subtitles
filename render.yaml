services:
  - type: web
    name: citavuk-recnik
    runtime: node
    plan: free
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 22.16.0
      - key: GROQ_API_KEY
        sync: false
