map $http_upgrade $serbiansubtitles_connection_upgrade {
    default upgrade;
    '' close;
}

server {
    listen 80;
    listen [::]:80;
    server_name denis.kornilov12.fvds.ru serbiansubtitles.online www.serbiansubtitles.online serbiansubtitles.ru www.serbiansubtitles.ru;

    client_max_body_size 2100m;
    client_body_timeout 3600s;

    location ~ /\. {
        deny all;
    }

    location / {
        proxy_pass http://127.0.0.1:8787;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $serbiansubtitles_connection_upgrade;
        proxy_connect_timeout 30s;
        proxy_send_timeout 3600s;
        proxy_read_timeout 3600s;
        proxy_request_buffering off;
        proxy_buffering off;
    }
}
